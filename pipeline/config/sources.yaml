  # -- Forskning --
  - id: arxiv-cs-ai
    tier: 1
    type: rss
    url: "http://export.arxiv.org/rss/cs.AI"
    label: "arXiv cs.AI"
    weight: 16

  - id: arxiv-cs-cl
    tier: 1
    type: rss
    url: "http://export.arxiv.org/rss/cs.CL"
    label: "arXiv cs.CL"
    weight: 14

  - id: arxiv-cs-lg
    tier: 1
    type: rss
    url: "http://export.arxiv.org/rss/cs.LG"
    label: "arXiv cs.LG"
    weight: 14

  - id: arxiv-cs-cv
    tier: 1
    type: rss
    url: "http://export.arxiv.org/rss/cs.CV"
    label: "arXiv cs.CV"
    weight: 12

  - id: arxiv-stat-ml
    tier: 1
    type: rss
    url: "http://export.arxiv.org/rss/stat.ML"
    label: "arXiv stat.ML"
    weight: 10

  # -- Hugging Face API (JSON) --
  - id: hf-models
    tier: 1
    type: json_api
    url: "https://huggingface.co/api/models"
    params:
      sort: "createdAt"
      direction: -1
      limit: 50
      full: true
    label: "HF Models"
    weight: 28

  - id: hf-daily-papers
    tier: 1
    type: json_api
    url: "https://huggingface.co/api/daily_papers"
    label: "HF Daily Papers"
    weight: 22

  # -- GitHub releases (Atom) --
  - id: github-llama
    tier: 1
    type: rss
    url: "https://github.com/ggml-org/llama.cpp/releases.atom"
    label: "GitHub: llama.cpp"
    weight: 10

  - id: github-transformers
    tier: 1
    type: rss
    url: "https://github.com/huggingface/transformers/releases.atom"
    label: "GitHub: transformers"
    weight: 8

  - id: github-vllm
    tier: 1
    type: rss
