# AI-Bladet — Källkonfiguration
# Tier 1: Primärkällor (officiella bloggar, modellregister, forskning, GitHub)
# Tier 2: Sekundärkällor (tech-media, kuraterade experter)
# Tier 3: Signalkällor (popularitet/upptäckt)
# Tier 4: Lucktäckare (Google News, SearXNG)

feeds:
  # === TIER 1: Primärkällor ===

  # -- Frontier-labb (RSS) --
  - id: openai
    tier: 1
    type: rss
    url: "https://openai.com/news/rss.xml"
    label: "OpenAI"
    weight: 30

  - id: huggingface-blog
    tier: 1
    type: rss
    url: "https://huggingface.co/blog/feed.xml"
    label: "Hugging Face Blog"
    weight: 25

  - id: qwen
    tier: 1
    type: rss
    url: "https://qwenlm.github.io/blog/index.xml"
    label: "Qwen (Alibaba)"
    weight: 22

  - id: google-ai
    tier: 1
    type: rss
    url: "https://blog.google/technology/ai/rss/"
    label: "Google AI"
    weight: 25

  - id: microsoft-ai
    tier: 1
    type: rss
    url: "https://azure.microsoft.com/en-us/blog/feed/"
    label: "Microsoft Azure/AI"
    weight: 20

  - id: nvidia
    tier: 1
    type: rss
    url: "https://blogs.nvidia.com/feed/"
    label: "NVIDIA"
    weight: 20

  - id: nvidia-dev
    tier: 1
    type: rss
    url: "https://developer.nvidia.com/blog/feed/"
