  # -- YouTube (produktlanseringar via keynote/launch-videor) --
  - id: youtube-openai
    tier: 1
    type: rss
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCXZCJLdBC09xxGZ6gcdrc6A"
    label: "YouTube: OpenAI"
    weight: 8

